spring.application.name=banking-system

# Datasource: allow overriding via environment variables (compose or Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:bankingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# H2 console available unless a real DB is provided
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
